version: '3.8'

services:
  # 1. Otak Vector Database (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # API Port
      - "6334:6334" # gRPC Port
    volumes:
      - qdrant_data:/qdrant/storage

  # 1.5. Redis for Rate Limiting / Caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru

  # 2. Logic Backend (FastAPI)
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - CLERK_PEM_KEY=${CLERK_PEM_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - qdrant
      - redis

volumes:
  qdrant_data:
  redis_data:
